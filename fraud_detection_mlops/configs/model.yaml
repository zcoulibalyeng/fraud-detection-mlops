name: fraud-detector
version: "1.0.0"
algorithm: xgboost
target_column: Class
feature_columns_exclude:
  - Class
  - Time
random_seed: 42

xgboost:
  n_estimators: 300
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  eval_metric: aucpr
  early_stopping_rounds: 20
  scale_pos_weight: 578  # ratio of negative/positive class