name: Deploy

#on:
#  push:
#    branches: [main]

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: fraud-detection-mlops
  SAGEMAKER_ENDPOINT: fraud-detector-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if CI passes
    needs: []
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update SageMaker endpoint
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          python fraud_detection_mlops/scripts/deploy_sagemaker.py \
            --image-uri $IMAGE_URI \
            --endpoint-name $SAGEMAKER_ENDPOINT \
            --region $AWS_REGION

      - name: Verify deployment
        run: |
          python fraud_detection_mlops/scripts/verify_deployment.py \
            --endpoint-name $SAGEMAKER_ENDPOINT \
            --region $AWS_REGION